<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#131c2b">
    <meta name="description" content="Attention-first view of the warden coordination ledger">
    <link rel="icon" href="/icons/vigil-favicon-mono.svg" type="image/svg+xml">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/styles.css">
    <title>Vigil — Coordination Board</title>
  </head>
  <body>
    <header class="masthead">
      <div class="brand">
        <img src="/icons/vigil-appicon.svg" alt="" width="46" height="46">
        <div><p class="eyebrow">WARDEN COORDINATION</p><h1>Vigil</h1></div>
      </div>
      <div class="health" aria-live="polite"><span id="status">Connecting</span><small id="refreshed">Waiting for ledger</small></div>
    </header>
    <main id="board" class="board" aria-live="polite"></main>
    <noscript>Vigil needs JavaScript to refresh the live coordination ledger.</noscript>
    <script type="module" src="/app.js"></script>
  </body>
</html>
